name: Build Android APK
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build APK with Docker
        run: |
          # 使用预配置的Buildozer Docker镜像
          docker run --rm -v $(pwd):/app -w /app kivy/buildozer:master buildozer android debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
